name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Run tests before build
        run: python -m pytest backend/tests/ --tb=short -q

      - name: Build executable
        run: pyinstaller veda.spec

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Archive build artifact
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.tag }}"
          $zipName = "Veda-TextEditor-$version-windows-x64.zip"
          Compress-Archive -Path dist\* -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: veda-windows-build
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Veda Text Editor ${{ steps.version.outputs.tag }}"
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          generate_release_notes: true
          files: ${{ env.ZIP_NAME }}
          body: |
            ## Installation

            **Requirements:** Windows 10/11, [Git](https://git-scm.com/), Python 3.11+

            1. Download and extract `Veda-TextEditor-${{ steps.version.outputs.tag }}-windows-x64.zip`
            2. Run `Veda.exe`

            > [!NOTE]
            > If Windows Defender SmartScreen blocks the app, click **More info → Run anyway**.
            > The app is not yet code-signed.
